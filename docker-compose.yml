services:
  copytraderx-license:
    container_name: copytraderx-license
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the bundle at build time.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    environment:
      # Server-side secrets — read at runtime. Never baked into the bundle.
      SUPABASE_URL: https://mkfabzqlxzeidfblxzhq.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Public vars also re-exposed at runtime so middleware (which runs in
      # the Node runtime, not the bundled client) reads them.
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    networks:
      - lgu-network
    expose:
      - "3000"

networks:
  lgu-network:
    external: true
    name: development_lgu-network
